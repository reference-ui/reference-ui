name: CI E2E

on:
  workflow_run:
    workflows:
      - CI Unit
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            packages/reference-rs/target/
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-${{ hashFiles('packages/reference-rs/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile native binary
        run: pnpm --filter @reference-ui/rust run build:native

      - name: Install Playwright browsers
        run: pnpm playwright:install

      - name: Run e2e CI suite
        run: pnpm run test:ci:e2e
