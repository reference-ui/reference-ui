# Only GitHub Actions workflow kept in this repo: build and deploy the docs site to GitHub Pages.
# Package builds, tests, and npm releases run through the Dagger pipeline (`pnpm pipeline`, `pnpm release`).

name: Docs

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docs.yml
      - .github/workflows/rust-compile.yml
      - package.json
      - pnpm-lock.yaml
      - packages/reference-core/**
      - packages/reference-lib/**
      - packages/reference-docs/**
      - packages/reference-rs/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  compile-rust:
    uses: ./.github/workflows/rust-compile.yml
    with:
      matrix_json: >-
        [{"runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"}]

  build:
    needs: compile-rust
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download native artifact
        uses: actions/download-artifact@v7
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: packages/reference-rs/artifacts/bindings-x86_64-unknown-linux-gnu

      - name: Stage local native artifacts
        run: pnpm --filter @reference-ui/rust run stage-local-artifacts

      - name: Build docs site
        run: pnpm --filter @reference-ui/lib run build && pnpm --filter @reference-ui/reference-docs run build:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/reference-docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
