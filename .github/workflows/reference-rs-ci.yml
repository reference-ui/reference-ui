name: Reference RS CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reference-rs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-reference-rs:
    uses: ./.github/workflows/reference-rs-compile.yml
    with:
      matrix_json: >-
        [{"runner":"macos-15-intel","target":"x86_64-apple-darwin"},{"runner":"macos-15","target":"aarch64-apple-darwin"},{"runner":"windows-latest","target":"x86_64-pc-windows-msvc"},{"runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"}]
