name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: changesets-main
  cancel-in-progress: false

jobs:
  changesets:
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
      needs_reference_rs: ${{ steps.detect.outputs.needs_reference_rs }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Install Playwright browsers
      #   run: pnpm playwright:install

      # - name: Run full release test suite
      #   run: pnpm test:ci

      - name: Create or update release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
        env:
          # Default Actions tokens can be blocked from PR creation by repository settings.
          # If present, use a dedicated token that is allowed to open/update release PRs.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Detect unpublished packages
        id: detect
        run: pnpm run release:detect

  compile-reference-rs:
    needs: changesets
    if: ${{ needs.changesets.outputs.has_changesets != 'true' && needs.changesets.outputs.needs_reference_rs == 'true' }}
    uses: ./.github/workflows/reference-rs-compile.yml
    with:
      matrix_json: >-
        [{"runner":"macos-15-intel","target":"x86_64-apple-darwin"},{"runner":"macos-15","target":"aarch64-apple-darwin"},{"runner":"windows-latest","target":"x86_64-pc-windows-msvc"},{"runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"}]

  publish:
    runs-on: ubuntu-latest
    needs:
      - changesets
      - compile-reference-rs
    if: ${{ needs.changesets.outputs.has_changesets != 'true' && needs.changesets.outputs.should_publish == 'true' && (needs.changesets.outputs.needs_reference_rs != 'true' || needs.compile-reference-rs.result == 'success') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download native artifacts
        if: needs.changesets.outputs.needs_reference_rs == 'true'
        uses: actions/download-artifact@v7
        with:
          pattern: bindings-*
          path: packages/reference-rs/artifacts

      - name: Publish packages
        run: pnpm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
