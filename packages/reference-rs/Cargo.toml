[package]
name = "reference-virtual-native"
version = "0.1.0"
edition = "2021"
description = "Native transforms for reference-ui virtual module (Rust)"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["napi8"] }
napi-derive = "2"
oxc_parser = "0.115"
oxc_ast = "0.115"
oxc_span = "0.115"
oxc_allocator = "0.115"
regex = "1.10"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
globwalk = "0.9.1"

[build-dependencies]
napi-build = "2"
